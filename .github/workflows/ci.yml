name: CI (Snapshot Build)

on:
  push:
    branches: [ main ]
    tags-ignore: [ '*' ]
    paths-ignore:
      - '.github/**'
      - '.gitattributes'
      - '.gitignore'
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ci-utilities-main
  cancel-in-progress: false

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ARTIFACTS_REPO_USER: ${{ secrets.ARTIFACTS_REPO_USER }}
      ARTIFACTS_REPO_TOKEN: ${{ secrets.ARTIFACTS_REPO_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build, test, and generate Javadocs and KDoc
        run: ./gradlew --no-daemon clean build javadoc

      - name: Upload reports and docs for Pages
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: reports-and-docs
          path: |
            **/build/reports/tests/test/**
            **/build/docs/javadoc/**
            **/build/dokka/**
          if-no-files-found: warn

  publish-pages:
    needs: build-and-test
    runs-on: ubuntu-latest

    if: >
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
      && github.ref == 'refs/heads/main'
      && needs.build-and-test.result == 'success'

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    env:
      ARTIFACTS_REPO_USER: ${{ secrets.ARTIFACTS_REPO_USER }}
      ARTIFACTS_REPO_TOKEN: ${{ secrets.ARTIFACTS_REPO_TOKEN }}
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Download reports and docs
        uses: actions/download-artifact@v4
        with:
          name: reports-and-docs
          path: _input

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages site
        run: |
          rm -rf _site
          mkdir -p _site/test-report _site/javadocs _site/kdoc

          # Write CSS stylesheet
          cat > _site/style.css <<'CSS'
          * { margin: 0; padding: 0; box-sizing: border-box; }
          body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.6; color: #333; background: #f5f5f5; }
          header.page-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 3rem 1rem; text-align: center; }
          header.page-header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
          header.page-header .subtitle { font-size: 1.1rem; opacity: 0.9; }
          main.container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
          section { margin-bottom: 3rem; }
          section h2 { font-size: 1.8rem; margin-bottom: 1.5rem; padding-bottom: 0.5rem; border-bottom: 3px solid #667eea; }
          .card-grid { list-style: none; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; }
          .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); transition: transform 0.2s, box-shadow 0.2s; }
          .card:hover { transform: translateY(-4px); box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
          .card a { display: block; padding: 1.5rem; text-decoration: none; color: inherit; }
          .card-title { font-weight: 600; font-size: 1.2rem; color: #667eea; display: block; margin-bottom: 0.5rem; }
          .card-meta { font-size: 0.9rem; color: #666; display: block; }
          footer { background: white; border-top: 1px solid #ddd; text-align: center; padding: 1.5rem; color: #666; margin-top: 2rem; }
          CSS

          # Write polished index.html
          cat > _site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <title>Build Reports</title>
          <link rel="stylesheet" href="./style.css">

          <header class="page-header">
            <h1>Build Reports</h1>
            <p class="subtitle">CI artefacts generated from <strong>main</strong></p>
          </header>

          <main class="container">

          <section>
            <h2>Test Reports</h2>
            <ul class="card-grid">
          EOF

          find _input -type d -path '*/build/reports/tests/test' -print0 |
          while IFS= read -r -d '' report_dir; do
            module="${report_dir#_input/}"
            module="${module%%/build/reports/tests/test}"
            mkdir -p "_site/test-report/$module"
            cp -R "$report_dir/." "_site/test-report/$module" || true

            cat >> _site/index.html <<EOF
              <li class="card">
                <a href="./test-report/$module/index.html">
                  <span class="card-title">$module</span>
                  <span class="card-meta">Unit test report</span>
                </a>
              </li>
            EOF
          done

          cat >> _site/index.html <<'EOF'
                </ul>
              </section>

              <section>
                <h2>KDoc (Dokka) Documentation</h2>
                <ul class="card-grid">
          EOF

          find _input -type d -path '*/build/dokka' -print0 |
          while IFS= read -r -d '' dokka_dir; do
            module="${dokka_dir#_input/}"
            module="${module%%/build/dokka}"
            mkdir -p "_site/kdoc/$module"
            cp -R "$dokka_dir/." "_site/kdoc/$module" || true

            # Only add card if index.html exists
            if [ -f "_site/kdoc/$module/index.html" ]; then
              cat >> _site/index.html <<'EOF'
                    <li class="card">
                      <a href="./kdoc/$module/index.html">
                        <span class="card-title">$module</span>
                        <span class="card-meta">Kotlin API documentation (Dokka)</span>
                      </a>
                    </li>
              EOF
            fi
          done

          cat >> _site/index.html <<'EOF'
                </ul>
              </section>
            </main>

            <footer>
              <p>Generated by GitHub Actions · <time id="ts"></time></p>
            </footer>

            <script>
              document.getElementById("ts").textContent =
                new Date().toISOString().replace("T", " ").replace("Z", " UTC");
            </script>
            </html>
          EOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

